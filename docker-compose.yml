version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: mobile_pricing
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/mobile_pricing
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: celery -A src.orchestrator worker --loglevel=info
    restart: always
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/mobile_pricing
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  beat:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: celery -A src.orchestrator beat --loglevel=info
    restart: always
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/mobile_pricing
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  redis:
    image: redis:7-alpine
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
